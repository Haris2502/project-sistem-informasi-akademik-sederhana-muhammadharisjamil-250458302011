name: sias

on:
  push:
    branches: [ main ]

jobs:
  web-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: 🚀 FTP Deploy
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ftp.jerryyss.my.id
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftps
        port: 21
        security: loose
        local-dir: ./
        server-dir: /domains/e-iot.jerryyss.my.id/public_html/
        log-level: verbose
