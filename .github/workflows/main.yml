name: e-commerce 

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📤 Deploy ke FTP Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.jerryyss.my.id
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}

          protocol: ftp
          port: 21
          security: loose

          local-dir: ./
          server-dir: /domains/sias.jerryyss.my.id/public_html/

          log-level: verbose
          timeout: 600000

          # 🔥 penting biar stabil
          dangerous-clean-slate: false
