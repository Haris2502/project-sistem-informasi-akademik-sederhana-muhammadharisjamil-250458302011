name: sias

on:
  push:
    branches: [ main ]

jobs:
  web-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    # Install PHP & Composer
    - name: 🐘 Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'

    - name: 📦 Install Composer Dependencies
      run: composer install --no-dev --optimize-autoloader

    # Build Laravel (optional kalau pakai Vite)
    - name: ⚙️ Build Assets
      run: |
        npm install
        npm run build

    # 🔥 DEPLOY (VERSI AMAN)
    - name: 🚀 FTP Deploy
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ftp.jerryyss.my.id
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftp
        port: 21
        security: loose
        local-dir: ./
        server-dir: /domains/sias.jerryyss.my.id/public_html/
        exclude: |
          **/.git*
          **/node_modules/**
          **/vendor/**
          **/.env
          **/tests/**
        log-level: verbose
